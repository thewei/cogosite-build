name: Build and Deploy

# ============================================================
# Build & deploy pipeline for thewei/cogosite (private).
# Triggered by cogosite's CI via `gh workflow run`, or manually
# from the Actions UI. Builds cogosite at the requested ref,
# optionally uploads the artifact and deploys. All credentials
# come from GitHub secrets — the workflow itself has none.
#
# monolith-split: the repo has three deployable Nuxt apps. The
# `app` input selects which one to build/ship; `platform` keeps
# the historical tar name and 2-arg deploy signature so the
# server side needs zero change for it.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA in cogosite to build'
        required: true
        default: 'main'
      env:
        description: 'Deploy target environment'
        type: choice
        options:
          - prod
          - uat
        default: prod
      app:
        description: 'Which app to build/deploy'
        type: choice
        options:
          - platform
          - editor
          - sites
        default: platform
      deploy:
        description: 'Upload to server and deploy after build?'
        type: boolean
        required: false
        default: true

jobs:
  build-and-deploy:
    name: Build & Deploy (${{ inputs.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Token must have `Contents: read` on thewei/cogosite.
      - name: Checkout cogosite source
        uses: actions/checkout@v6
        with:
          repository: thewei/cogosite
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GIT_PULL_TOKEN }}
          lfs: true

      - name: Compute short SHA + app config
        id: meta
        env:
          APP: ${{ inputs.app }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          # Per-app config. platform keeps the historical tar prefix
          # (cogosite-<env>-<sha>) so the server wrapper allow-list and
          # deploy script signature stay unchanged for it.
          case "$APP" in
            platform)
              echo "app_dir=apps/nuxt-app"          >> $GITHUB_OUTPUT
              echo "build_script=build:nuxt"        >> $GITHUB_OUTPUT
              echo "tar_prefix=cogosite"            >> $GITHUB_OUTPUT
              echo "verify_host_prod=cogosite.com"  >> $GITHUB_OUTPUT
              ;;
            editor)
              echo "app_dir=apps/editor"            >> $GITHUB_OUTPUT
              echo "build_script=build:editor"      >> $GITHUB_OUTPUT
              echo "tar_prefix=cogosite-editor"     >> $GITHUB_OUTPUT
              echo "verify_host_prod=editor.cogosite.com" >> $GITHUB_OUTPUT
              ;;
            sites)
              echo "app_dir=apps/sites"             >> $GITHUB_OUTPUT
              echo "build_script=build:sites"       >> $GITHUB_OUTPUT
              echo "tar_prefix=cogosite-sites"      >> $GITHUB_OUTPUT
              # sites serves wildcard tenant domains — no canonical apex
              # to poll, so post-deploy verification is skipped for it.
              echo "verify_host_prod="              >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::unknown app '$APP'"; exit 1 ;;
          esac

      - uses: pnpm/action-setup@v3
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # BUILD_TIME=true gates build-only code paths in cogosite's build
      # scripts. No runtime secrets (DATABASE_URL, etc.) are needed at
      # build time — they are injected at runtime.
      #
      # NODE_OPTIONS: Nuxt build's Nitro phase (trace + bundle all server
      # imports) pushes V8 past its ~4GB default heap. 8GB headroom fits
      # comfortably on the 16GB ubuntu-latest runner.
      #
      # COMMIT_SHA / BUILD_TIME_ISO: baked into the .output via
      # runtimeConfig.commitSha / runtimeConfig.buildTime. The running
      # server exposes them at /api/__version, which the post-deploy
      # verification step below polls.
      - name: Build Nuxt app (${{ inputs.app }})
        env:
          BUILD_TIME: 'true'
          NODE_OPTIONS: '--max-old-space-size=8192'
          COMMIT_SHA: ${{ steps.meta.outputs.short_sha }}
          BUILD_TIME_ISO: ${{ steps.meta.outputs.build_time }}
        run: pnpm run ${{ steps.meta.outputs.build_script }}

      - name: Verify build output
        env:
          APP_DIR: ${{ steps.meta.outputs.app_dir }}
        run: |
          test -f "$APP_DIR/.output/server/index.mjs" \
            || { echo "::error::$APP_DIR/.output/server/index.mjs missing after build"; exit 1; }

      # Pack the contents of .output (not the dir itself). --no-xattrs
      # drops extended attrs (irrelevant cross-platform); the excludes
      # scrub macOS noise.
      - name: Pack .output
        env:
          APP_DIR: ${{ steps.meta.outputs.app_dir }}
        run: |
          mkdir -p artifact
          tar --no-xattrs --exclude='.DS_Store' --exclude='._*' \
            -czf artifact/output.tar.gz \
            -C "$APP_DIR/.output" .
          ls -lh artifact/output.tar.gz

      # Stream the tarball to the server via SSH stdin, then trigger the
      # deploy script in a second SSH call.
      - name: Write SSH key to tmpfile
        if: ${{ inputs.deploy }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > /tmp/deploy.key
          chmod 600 /tmp/deploy.key

      # IaC: sync server-side scripts from the repo to the server.
      # Only on platform deploys (scripts are shared, no need to sync thrice).
      # Source of truth: cogosite (private) scripts/server/*.sh
      - name: Sync server scripts
        if: ${{ inputs.deploy && inputs.app == 'platform' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          SSH_CMD="ssh -i /tmp/deploy.key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"
          for f in cogosite-deploy.sh cogosite-migrate.sh cogosite-ssh-wrapper.sh; do
            $SSH_CMD deploy@${DEPLOY_HOST} "cat > /tmp/$f" < scripts/server/$f
          done
          $SSH_CMD deploy@${DEPLOY_HOST} "install-server-scripts"

      - name: Stream tarball to server
        if: ${{ inputs.deploy }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ENV: ${{ inputs.env }}
          TAR_PREFIX: ${{ steps.meta.outputs.tar_prefix }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          set -euo pipefail
          ssh -i /tmp/deploy.key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              -o ServerAliveInterval=15 \
              deploy@${DEPLOY_HOST} \
              "cat > /tmp/${TAR_PREFIX}-${DEPLOY_ENV}-${SHORT_SHA}.tar.gz" \
            < artifact/output.tar.gz
          echo "  uploaded ($(du -h artifact/output.tar.gz | cut -f1))"

      # platform uses the historical 2-arg signature; editor/sites pass
      # the app name as a 3rd arg (server-side cogosite-deploy.sh must
      # support it — see cogosite docs/implementation/monolith-split-deploy.md).
      - name: Trigger deploy script
        if: ${{ inputs.deploy }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ENV: ${{ inputs.env }}
          APP: ${{ inputs.app }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          set -euo pipefail
          if [ "$APP" = "platform" ]; then
            DEPLOY_CMD="/usr/local/bin/cogosite-deploy.sh ${DEPLOY_ENV} ${SHORT_SHA}"
          else
            DEPLOY_CMD="/usr/local/bin/cogosite-deploy.sh ${DEPLOY_ENV} ${SHORT_SHA} ${APP}"
          fi
          ssh -i /tmp/deploy.key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=10 \
              deploy@${DEPLOY_HOST} \
              "$DEPLOY_CMD"

      - name: Cleanup SSH key
        if: ${{ always() && inputs.deploy }}
        run: rm -f /tmp/deploy.key

      # Server-side deploy is async; poll /api/__version until the running
      # container reports the SHA we just shipped. Worst case ~3 min for a
      # slow restart; fail-fast otherwise. Skipped for apps without a
      # canonical host (sites — wildcard tenant domains only).
      - name: Verify deployment (app=${{ inputs.app }} env=${{ inputs.env }})
        if: ${{ inputs.deploy }}
        env:
          DEPLOY_ENV: ${{ inputs.env }}
          EXPECTED_SHA: ${{ steps.meta.outputs.short_sha }}
          VERIFY_HOST_PROD: ${{ steps.meta.outputs.verify_host_prod }}
        run: |
          # NOTE: no `set -e` here. During Coolify's atomic symlink swap
          # prod briefly returns 502 HTML or empty bodies; jq parse-fails
          # on those and `set -e + pipefail` killed this step after 16s
          # (run 28294852640). We retry the full 3-min window instead.
          #
          # UAT verification is skipped: UAT sits behind Traefik Basic Auth
          # so /api/__version returns 401 to unauthenticated polling. UAT
          # deploys are verified out-of-band (e.g. docker exec inside the
          # container, or authenticated curl from a trusted host).
          set -uo pipefail
          if [ "$DEPLOY_ENV" != "prod" ]; then
            echo "Skipping /api/__version verification for env=$DEPLOY_ENV (non-prod)."
            echo "Verify manually if needed."
            exit 0
          fi
          VERIFY_HOST="$VERIFY_HOST_PROD"
          if [ -z "$VERIFY_HOST" ]; then
            echo "No canonical host for this app — skipping /api/__version verification."
            echo "Verify manually against a tenant domain if needed."
            exit 0
          fi
          BASE_URL="https://${VERIFY_HOST}"
          echo "Polling $BASE_URL/api/__version for sha=$EXPECTED_SHA"
          for i in $(seq 1 36); do
            sleep 5
            RESP=$(curl -s --max-time 5 "$BASE_URL/api/__version" || echo '{}')
            # Defensive: mid-restart prod may serve HTML/empty — jq would
            # parse-error and (under pipefail) kill the step. Skip and retry.
            if ! ACTUAL_SHA=$(echo "$RESP" | jq -r '.sha // empty' 2>/dev/null); then
              echo "  [$i/36] non-JSON response (likely mid-restart), waiting 5s..."
              continue
            fi
            if [ "$ACTUAL_SHA" = "$EXPECTED_SHA" ]; then
              echo "✓ verified at attempt $i/36"
              echo "  sha:      $ACTUAL_SHA"
              echo "  buildTime: $(echo "$RESP" | jq -r '.buildTime')"
              echo "  uptime:   $(echo "$RESP" | jq -r '.runtime.uptime')s"
              exit 0
            fi
            echo "  [$i/36] got sha='$ACTUAL_SHA', waiting 5s..."
          done
          echo "::error::Deploy verification timed out. $BASE_URL/api/__version did not report sha=$EXPECTED_SHA within 3 min."
          exit 1
